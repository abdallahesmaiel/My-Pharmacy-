<!-- زر الرجوع العائم للأجهزة المحمولة -->
<button class="mobile-back-button hidden" id="mobileBackBtn" onclick="handleMobileBack()">
    <i class="fas fa-arrow-right"></i>
</button>

<div class="sidebar" id="sidebar">
    <div class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></div>

        <p id="sidebarUserType"></p>

    <a href="#" id="sideRequests"><i class="fas fa-clipboard-list"></i> طلباتي</a>

</div>

<!-- طبقة تكبير الصورة -->

    <span class="image-zoom-close" onclick="closeImageZoom()">&times;</span>
    <img id="zoomedImage" src="" alt="صورة مكبرة">
</div>

<script>
    // تكوين Firebase (نفس الإعدادات السابقة)
    const firebaseConfig = {
        apiKey: "AIzaSyCdeHmlFnIJ2e9kQvXZ8XsF1yFOFlSqXU0",
        authDomain: "facebookat-d5f39.firebaseapp.com",
        databaseURL: "https://facebookat-d5f39-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "facebookat-d5f39",
        storageBucket: "facebookat-d5f39.firebasestorage.app",
        messagingSenderId: "1070831866107",
        appId: "1:1070831866107:web:0ceaae0c5cf20c0cd9605e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let notificationInterval = null;
    let cleanupInterval = null;
    
    // ========== نظام إدارة التاريخ وزر الرجوع ==========
    const historyStack = [];
    let isHandlingPopState = false;
    
    // دوال إدارة التاريخ
    function pushHistoryState(state, title, url) {
        historyStack.push({ state, title, url });
        history.pushState(state, title, url);
        updateMobileBackButton();
    }
    
    function replaceHistoryState(state, title, url) {
        if (historyStack.length > 0) {
            historyStack[historyStack.length - 1] = { state, title, url };
        }
        history.replaceState(state, title, url);
        updateMobileBackButton();
    }
    
    function goBack() {
        if (historyStack.length > 1) {
            historyStack.pop(); // إزالة الصفحة الحالية
            const previousState = historyStack[historyStack.length - 1];
            isHandlingPopState = true;
            history.back();
            setTimeout(() => {
                isHandlingPopState = false;
                if (previousState) {
                    handleState(previousState.state);
                }
            }, 50);
        } else if (currentUser) {
            // إذا كان المستخدم مسجل الدخول، ارجع للصفحة الرئيسية
            renderPage();
        } else {
            // إذا لم يكن مسجل، اعرض شاشة تسجيل الدخول
            showAuthScreen();
        }
        updateMobileBackButton();
    }
    
    function handleState(state) {
        if (!state) {
            if (currentUser) {
                renderPage();
            } else {
                showAuthScreen();
            }
            return;
        }
        
        switch (state.page) {
            case 'home':
                renderPage();
                break;
            case 'profile':
                if (currentUser) renderProfile();
                else showAuthScreen();
                break;
            case 'requests':
                if (currentUser) {
                    if (currentUser.type === 'client') renderClientRequests();
                    else if (currentUser.type === 'pharmacy') renderPharmacyRequests();
                } else showAuthScreen();
                break;
            case 'pharmacy-details':
                if (currentUser && state.pharmacyId) {
                    viewPharmacy(state.pharmacyId);
                } else {
                    renderPage();
                }
                break;
            case 'client-profile':
                if (currentUser && state.clientId) {
                    viewClientProfile(state.clientId);
                } else {
                    renderPage();
                }
                break;
            default:
                if (currentUser) renderPage();
                else showAuthScreen();
        }
    }
    
    function updateMobileBackButton() {
        const mobileBackBtn = document.getElementById('mobileBackBtn');
        if (historyStack.length > 1) {
            mobileBackBtn.classList.remove('hidden');
        } else {
            mobileBackBtn.classList.add('hidden');
        }
    }
    
    function handleMobileBack() {
        goBack();
    }
    
    // مستمع لحدث popstate (عند الضغط على زر الرجوع في المتصفح/الهاتف)
    window.addEventListener('popstate', function(event) {
        if (isHandlingPopState) {
            isHandlingPopState = false;
            return;
        }
        
        // إزالة العنصر الحالي من المكدس
        if (historyStack.length > 0) {
            historyStack.pop();
        }
        
        // معالجة الحالة الجديدة
        if (event.state) {
            handleState(event.state);
        } else {
            // إذا لم توجد حالة، نعود للوضع الافتراضي
            if (currentUser) {
                renderPage();
            } else {
                showAuthScreen();
            }
        }
        
        updateMobileBackButton();
    });
    
    // منع الرجوع للخلف عند فتح المودال أو السايدبار
    function preventBackWhenModalOpen() {
        const modals = document.querySelectorAll('.modal[style*="display: flex"]');
        const sidebarOpen = document.getElementById('sidebar').classList.contains('open');
        const overlay = document.getElementById('imageZoomOverlay');
        
        if (modals.length > 0) {
            // إغلاق آخر مودال مفتوح
            const lastModal = modals[modals.length - 1];
            lastModal.remove();
            return true;
        } else if (sidebarOpen) {
            closeSidebar();
            return true;
        } else if (overlay.style.display === 'flex') {
            closeImageZoom();
            return true;
        }
        return false;
    }

    // ========== دوال Firebase والبيانات ==========

    async function initLocationsData() {
        try {
            const snap = await db.ref('locations/cities').once('value');
            if (!snap.exists()) {
                console.log("تهيئة بيانات المدن الافتراضية...");
                const citiesData = {};
                for (let gov in defaultGovernorates) {
                    citiesData[gov] = {};
                    defaultGovernorates[gov].forEach(center => {
                        citiesData[gov][center] = [];
                    });
                }
                await db.ref('locations/cities').set(citiesData);
                console.log("✅ تم تهيئة بيانات المدن");
            }
        } catch (e) {
            console.error("خطأ في تهيئة البيانات:", e);
        }
    }

    async function saveNewCity(governorate, center, cityName) {
        if (!governorate || !center || !cityName) return false;
        try {
            const cityRef = db.ref(`locations/cities/${governorate}/${center}`);
            const snap = await cityRef.once('value');
            let cities = snap.exists() ? snap.val() : [];
            
            if (!cities.includes(cityName)) {
                cities.push(cityName);
                cities.sort();
                await cityRef.set(cities);
                console.log(`✅ تم حفظ "${cityName}" في ${governorate} - ${center}`);
                return true;
            }
            return true;
        } catch (e) {
            console.error("خطأ في حفظ المدينة:", e);
            return false;
        }
    }

    async function getCitiesFromFirebase(governorate, center) {
        if (!governorate || !center) return [];
        try {
            const snap = await db.ref(`locations/cities/${governorate}/${center}`).once('value');
            return snap.exists() ? snap.val() : [];
        } catch (e) {
            console.error("خطأ في جلب المدن:", e);
            return [];
        }
    }

    async function updateCityOptions(governorateSelectId, centerSelectId, citySelectId, newCityContainerId, selectedCity = '') {
        const governorate = document.getElementById(governorateSelectId)?.value;
        const center = document.getElementById(centerSelectId)?.value;
        const citySelect = document.getElementById(citySelectId);
        const newCityContainer = document.getElementById(newCityContainerId);
        
        if (!citySelect) return;
        
        if (!governorate || !center) {
            citySelect.innerHTML = '<option value="">اختر المركز أولاً</option>';
            citySelect.disabled = true;
            if (newCityContainer) newCityContainer.style.display = 'none';
            return;
        }
        
        const cities = await getCitiesFromFirebase(governorate, center);
        let options = '<option value="">اختر المدينة/القرية</option>';
        cities.forEach(city => {
            options += `<option value="${city}" ${selectedCity === city ? 'selected' : ''}>${city}</option>`;
        });
        options += '<option value="__other__" style="color: #1abc9c; font-weight: bold;">➕ أخرى (إضافة مدينة/قرية جديدة)</option>';
        
        citySelect.innerHTML = options;
        citySelect.disabled = false;
    }

    function showMessage(message, isError = false) {
        const existing = document.querySelector('.sweet-message');
        if (existing) existing.remove();
        const msgDiv = document.createElement('div');
        msgDiv.className = 'sweet-message';
        msgDiv.innerHTML = `<i class="fas ${isError ? 'fa-times-circle' : 'fa-check-circle'}" style="color: ${isError ? '#e74c3c' : '#27ae60'}; font-size: 2rem;"></i><p>${message}</p>`;
        document.body.appendChild(msgDiv);
        setTimeout(() => msgDiv.remove(), 2000);
    }

    function showConfirm(title, message, onConfirm) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><h3>${title}</h3><p>${message}</p><div class="modal-buttons"><button class="accept-btn" id="confirmYes">نعم</button><button class="reject-btn" id="confirmNo">إلغاء</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('confirmYes').onclick = () => { onConfirm(); modal.remove(); };
        document.getElementById('confirmNo').onclick = () => modal.remove();
        
        // إضافة مستمع لزر الرجوع لإغلاق المودال
        const handleBack = (e) => {
            if (e.key === 'Escape') {
                modal.remove();
                document.removeEventListener('keydown', handleBack);
            }
        };
        document.addEventListener('keydown', handleBack);
    }

    async function getAllPharmaciesByCenter(center, city = '') {
        const snap = await db.ref('users')
            .orderByChild('center')
            .equalTo(center)
            .once('value');
        
        const pharmacies = [];
        snap.forEach(child => {
            const user = child.val();
            if (user.type === 'pharmacy') {
                if (!city || user.city === city) {
                    pharmacies.push({ username: child.key, ...user });
                }
            }
        });
        return pharmacies;
    }

    async function getRequestsForUser(username, type) {
        const field = type === 'client' ? 'clientId' : 'pharmacyId';
        const snap = await db.ref('requests')
            .orderByChild(field)
            .equalTo(username)
            .once('value');
        
        const requests = [];
        snap.forEach(s => {
            requests.push({ id: s.key, ...s.val() });
        });
        return requests;
    }

    async function cleanupOldRequests() {
        if (!currentUser) return;
        const now = Date.now();
        const fiveMinutes = 5 * 60 * 1000;
        const twentyFourHours = 24 * 60 * 60 * 1000;
        
        const requests = await getRequestsForUser(currentUser.username, currentUser.type === 'client' ? 'client' : 'pharmacy');
        const updates = {};
        
        for (let req of requests) {
            const completedAt = req.completedAt || req.rejectedAt;
            if (completedAt) {
                const timeDiff = now - completedAt;
                if (currentUser.type === 'pharmacy' && (req.status === 'completed' || req.status === 'rejected')) {
                    if (timeDiff >= fiveMinutes) updates[req.id] = null;
                }
                else if (currentUser.type === 'client' && (req.status === 'completed' || req.status === 'rejected')) {
                    if (timeDiff >= twentyFourHours) updates[req.id] = null;
                }
            }
        }
        
        if (Object.keys(updates).length > 0) {
            await db.ref('requests').update(updates);
        }
    }

    function startCleanupInterval() {
        if (cleanupInterval) clearInterval(cleanupInterval);
        cleanupInterval = setInterval(async () => {
            if (currentUser) {
                await cleanupOldRequests();
                const currentView = document.querySelector('#reqList');
                if (currentView) {
                    if (currentUser.type === 'client') renderClientRequests();
                    else if (currentUser.type === 'pharmacy') renderPharmacyRequests();
                }
            }
        }, 60000);
    }

    async function loginUser(username, password, rememberMe = false) {
        const snapshot = await db.ref('users').orderByChild('username').equalTo(username).once('value');
        if (snapshot.exists()) {
            let userData = null;
            snapshot.forEach(child => { userData = child.val(); });
            if (userData && userData.password === password) {
                currentUser = { username: username, ...userData };
                if (rememberMe) { 
                    localStorage.setItem('rememberedUser', username); 
                    localStorage.setItem('rememberedPass', password); 
                } else {
                    localStorage.removeItem('rememberedUser'); 
                    localStorage.removeItem('rememberedPass');
                }
                updateUI();
                
                // مسح التاريخ والبدء من الصفحة الرئيسية
                historyStack.length = 0;
                replaceHistoryState({ page: 'home' }, 'الرئيسية', '#home');
                
                renderPage();
                startNotifications();
                startCleanupInterval();
                showMessage(`مرحباً ${currentUser.type === 'pharmacy' ? (currentUser.pharmacyName || username) : username}!`);
                return true;
            } else { showMessage('كلمة المرور غير صحيحة', true); return false; }
        } else { showMessage('اسم المستخدم غير موجود', true); return false; }
    }

    async function registerUser(username, password, type, pharmacyName, phone, whatsappCode, whatsappNumber, governorate, center, city) {
        const snapshot = await db.ref('users').orderByChild('username').equalTo(username).once('value');
        if (snapshot.exists()) { showMessage('اسم المستخدم موجود بالفعل', true); return false; }
        
        const fullWhatsapp = whatsappCode + whatsappNumber;
        const userData = {
            username, password, type, avatar: '', ratingSum: 0, ratingCount: 0, avgRating: 0, comments: [],
            bio: type === 'pharmacy' ? 'صيدلية موثوقة تقدم خدمات دوائية ممتازة' : 'مريض يبحث عن أدويته',
            createdAt: new Date().toISOString(), 
            governorate, center, city,
            governorate_center: `${governorate}_${center}`
        };
        
        if (type === 'pharmacy') {
            if (!phone || !pharmacyName) { showMessage('اسم الصيدلية ورقم الهاتف مطلوبان', true); return false; }
            userData.pharmacyName = pharmacyName;
            userData.phone = phone;
            userData.whatsappCode = whatsappCode;
            userData.whatsappNumber = whatsappNumber;
            userData.whatsapp = fullWhatsapp;
        }
        
        await db.ref('users/' + username).set(userData);
        currentUser = { username: username, ...userData };
        updateUI();
        
        // مسح التاريخ والبدء من الصفحة الرئيسية
        historyStack.length = 0;
        replaceHistoryState({ page: 'home' }, 'الرئيسية', '#home');
        
        renderPage();
        startNotifications();
        startCleanupInterval();
        showMessage(`تم إنشاء الحساب بنجاح! مرحباً ${type === 'pharmacy' ? pharmacyName : username}`);
        return true;
    }

    function openAvatarModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-camera"></i> تغيير الصورة الشخصية</h3><div class="image-preview" id="previewContainer"><i class="fas fa-user-circle" style="font-size: 5rem; color: #ccc;"></i></div><label class="upload-btn"><i class="fas fa-cloud-upload-alt"></i> اختر صورة من الجهاز <input type="file" id="avatarFile" accept="image/*" class="file-input"></label><p style="font-size: 0.7rem; color: #7f8c8d;">يدعم الصور JPG, PNG (حد أقصى 2MB)</p><div class="modal-buttons"><button id="saveAvatarBtn" class="accept-btn">حفظ الصورة</button><button id="closeAvatarBtn" class="reject-btn">إلغاء</button></div></div>`;
        document.body.appendChild(modal);
        let selectedBase64 = null;
        document.getElementById('avatarFile').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) { showMessage('الصورة كبيرة جداً (حد أقصى 2MB)', true); return; }
                const reader = new FileReader();
                reader.onload = (ev) => { selectedBase64 = ev.target.result; document.getElementById('previewContainer').innerHTML = `<img src="${selectedBase64}" style="width:100%;height:100%;object-fit:cover;">`; };
                reader.readAsDataURL(file);
            }
        };
        document.getElementById('saveAvatarBtn').onclick = async () => {
            if (selectedBase64) {
                await db.ref('users/' + currentUser.username).update({ avatar: selectedBase64 });
                currentUser.avatar = selectedBase64;
                updateUI();
                showMessage('تم تحديث الصورة الشخصية بنجاح!');
                modal.remove();
                renderProfile();
            } else showMessage('الرجاء اختيار صورة أولاً', true);
        };
        document.getElementById('closeAvatarBtn').onclick = () => modal.remove();
    }

    async function renderClientRequests() {
        pushHistoryState({ page: 'requests' }, 'طلباتي', '#requests');
        
        const requests = await getRequestsForUser(currentUser.username, 'client');
        
        document.getElementById('appContent').innerHTML = `<div class="container"><button class="back-button" onclick="goBack()"><i class="fas fa-arrow-right"></i> رجوع</button><h2 style="color: white;">طلباتي</h2><div id="reqList" class="profile-info"></div></div>`;
        const container = document.getElementById('reqList');
        if (requests.length === 0) { container.innerHTML = '<p style="text-align: center;">لا توجد طلبات حالياً</p>'; return; }
        
        const now = Date.now();
        const twentyFourHours = 24 * 60 * 60 * 1000;
        
        const pending = requests.filter(r => r.status === 'pending');
        const accepted = requests.filter(r => r.status === 'accepted');
        const completed = requests.filter(r => r.status === 'completed' && !r.rated && (now - (r.completedAt || 0) < twentyFourHours));
        const rejected = requests.filter(r => r.status === 'rejected' && (now - (r.rejectedAt || 0) < twentyFourHours));
        
        let html = '';
        
        if (pending.length) html += '<h3 class="section-title">⏳ طلبات قيد الانتظار</h3>' + pending.map(r => `<div class="request-item"><p><strong>الصيدلية: ${r.pharmacyName}</strong></p><p>الدواء: ${r.medicineName}</p><p>العنوان: ${r.address}</p><p>الحالة: في انتظار موافقة الصيدلية</p>${r.prescriptionImage ? `<div class="prescription-container"><strong>الروشتة:</strong><br><img src="${r.prescriptionImage}" class="prescription-img" onclick="zoomImage(this)"></div>` : ''}</div>`).join('');
        
        if (accepted.length) html += '<h3 class="section-title">✅ طلبات قيد التجهيز</h3>' + accepted.map(r => `<div class="request-item"><p><strong>الصيدلية: ${r.pharmacyName}</strong></p><p>الدواء: ${r.medicineName}</p><p>العنوان: ${r.address}</p><p>الحالة: جاري تجهيز الطلب</p>${r.prescriptionImage ? `<div class="prescription-container"><strong>الروشتة:</strong><br><img src="${r.prescriptionImage}" class="prescription-img" onclick="zoomImage(this)"></div>` : ''}</div>`).join('');
        
        if (completed.length) {
            html += '<h3 class="section-title">⭐ طلبات مكتملة - قيد التقييم</h3>';
            for (let r of completed) {
                const timeRemaining = Math.ceil((twentyFourHours - (now - r.completedAt)) / (60 * 60 * 1000));
                html += `<div class="request-item"><p><strong>الصيدلية: ${r.pharmacyName}</strong></p><p>الدواء: ${r.medicineName}</p><p>✅ تم تسليم الدواء بنجاح</p><div class="time-remaining">متاح للتقييم لمدة ${timeRemaining} ساعة</div>${r.prescriptionImage ? `<div class="prescription-container"><strong>الروشتة:</strong><br><img src="${r.prescriptionImage}" class="prescription-img" onclick="zoomImage(this)"></div>` : ''}<button id="rate_${r.id}" class="accept-btn">⭐ تقييم الخدمة</button></div>`;
            }
        }
        
        if (rejected.length) {
            html += '<h3 class="section-title">❌ طلبات مرفوضة</h3>';
            for (let r of rejected) {
                html += `<div class="request-item"><p><strong>الصيدلية: ${r.pharmacyName}</strong></p><p>الدواء: ${r.medicineName}</p><p>❌ تم رفض الطلب</p>${r.rejectReason ? `<div style="margin-top: 8px;"><i class="fas fa-comment"></i> سبب الرفض: ${r.rejectReason}</div>` : ''}${r.prescriptionImage ? `<div class="prescription-container"><strong>الروشتة:</strong><br><img src="${r.prescriptionImage}" class="prescription-img" onclick="zoomImage(this)"></div>` : ''}</div>`;
            }
        }
        
        container.innerHTML = html;
        
        for (let r of completed) document.getElementById(`rate_${r.id}`)?.addEventListener('click', () => openRatingModal(r.id, r.pharmacyId));
    }

    async function renderPharmacyRequests() {

        const requests = await getRequestsForUser(currentUser.username, 'pharmacy');

                    <button id="accept_${r.id}" class="accept-btn"><i class="fas fa-check"></i> قبول الطلب</button>
                    <button id="reject_${r.id}" class="reject-btn"><i class="fas fa-times"></i> رفض الطلب</button>

        for (let r of accepted) {
            const client = await getUserData(r.clientId);

                    <div><span class="client-name" onclick="viewClientProfile('${r.clientId}')">${client?.username || r.clientId}</span><div class="location-badge" style="margin-top: 4px;">${client?.city || ''} - ${client?.center || ''}</div></div>
                </div>
                <p><strong>الدواء:</strong> ${r.medicineName}</p>
                <p><strong>العنوان:</strong> ${r.address}</p>
                <p><strong>هاتف المريض:</strong> ${r.clientPhone} <button class="call-btn" onclick="window.location.href='tel:${r.clientPhone}'"><i class="fas fa-phone"></i> اتصال</button> <button class="call-btn" onclick="openWhatsApp('${r.clientPhone}')"><i class="fab fa-whatsapp"></i> واتساب</button></p>
                ${r.prescriptionImage ? `<div class="prescription-container"><strong>الروشتة:</strong><br><img src="${r.prescriptionImage}" class="prescription-img" onclick="zoomImage(this)"></div>` : ''}
                ${r.prescriptionNotes ? `<div class="prescription-container"><strong>ملاحظات:</strong><p>${r.prescriptionNotes}</p></div>` : ''}
                <button id="complete_${r.id}" class="accept-btn"><i class="fas fa-check-double"></i> تم تسليم الدواء</button>
            </div>`;
        }
        
        if (completed.length) {
            html += '<h3 class="section-title" style="color: #27ae60;">✅ طلبات مكتملة (سيتم حذفها تلقائياً)</h3>';
            for (let r of completed) {
                const timeRemaining = Math.ceil((fiveMinutes - (now - r.completedAt)) / 60000);
                html += `<div class="request-item"><p><strong>الدواء:</strong> ${r.medicineName}</p><p><strong>المريض:</strong> ${r.clientName || r.clientId}</p><p>✅ تم تسليم الدواء</p><div class="time-remaining">سيتم الحذف بعد ${timeRemaining} دقيقة</div></div>`;
            }
        }
        
        if (rejected.length) {
            html += '<h3 class="section-title" style="color: #e74c3c;">❌ طلبات مرفوضة (سيتم حذفها تلقائياً)</h3>';
            for (let r of rejected) {
                const timeRemaining = Math.ceil((fiveMinutes - (now - r.rejectedAt)) / 60000);
                html += `<div class="request-item"><p><strong>الدواء:</strong> ${r.medicineName}</p><p><strong>المريض:</strong> ${r.clientName || r.clientId}</p><p>❌ تم رفض الطلب</p>${r.rejectReason ? `<p>السبب: ${r.rejectReason}</p>` : ''}<div class="time-remaining">سيتم الحذف بعد ${timeRemaining} دقيقة</div></div>`;

            document.getElementById(`accept_${r.id}`)?.addEventListener('click', () => showConfirm('قبول الطلب', 'هل توافق على قبول هذا الطلب؟', async () => {

                await db.ref('requests/' + r.id).update({ status: 'completed', completedAt: Date.now() }); 
                showMessage('تم تسليم الدواء بنجاح!'); 
                renderPharmacyRequests(); 
                updateNotificationCount(); 
            }));
        }
    }

        const requests = await getRequestsForUser(currentUser.username, 'pharmacy');
        let completed = 0, rejected = 0, pending = 0, accepted = 0;
        
        requests.forEach(req => {
            if (req.status === 'completed') completed++;
            else if (req.status === 'rejected') rejected++;
            else if (req.status === 'pending') pending++;
            else if (req.status === 'accepted') accepted++;
        });
        
        const latestComments = (currentUser.comments || []).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
        
        document.getElementById('appContent').innerHTML = `
            <div class="container">
                <div style="background: rgba(255,255,255,0.9); border-radius: 15px; padding: 1rem; margin-bottom: 1rem; text-align: center;"><h3><i class="fas fa-map-marker-alt"></i> موقع الصيدلية</h3><p><strong>المحافظة:</strong> ${currentUser.governorate || 'غير محدد'} | <strong>المركز:</strong> ${currentUser.center || 'غير محدد'} | <strong>المدينة/القرية:</strong> ${currentUser.city || 'غير محدد'}</p></div>
                <h2 style="color: white;"><i class="fas fa-chart-line"></i> لوحة التحكم والإحصائيات</h2>

                    <div class="card"><div class="card-avatar">${currentUser.avatar ? `<img src="${currentUser.avatar}">` : '<i class="fas fa-star"></i>'}</div><h3>التقييم العام</h3><p style="font-size:1.5rem;">⭐ ${currentUser.avgRating ? currentUser.avgRating.toFixed(1) : 'لا يوجد'}</p></div>
                    <div class="card"><div class="card-avatar"><i class="fas fa-users"></i></div><h3>عدد التقييمات</h3><p style="font-size:1.5rem;">${currentUser.ratingCount || 0}</p></div>
                    <div class="card"><div class="card-avatar"><i class="fas fa-check-circle"></i></div><h3>الطلبات المكتملة</h3><p style="font-size:1.5rem; color:#27ae60;">${completed}</p></div>
                    <div class="card"><div class="card-avatar"><i class="fas fa-times-circle"></i></div><h3>الطلبات المرفوضة</h3><p style="font-size:1.5rem; color:#e74c3c;">${rejected}</p></div>
                    <div class="card"><div class="card-avatar"><i class="fas fa-clock"></i></div><h3>قيد الانتظار</h3><p style="font-size:1.5rem; color:#f39c12;">${pending}</p></div>
                    <div class="card"><div class="card-avatar"><i class="fas fa-play-circle"></i></div><h3>قيد التجهيز</h3><p style="font-size:1.5rem; color:#3498db;">${accepted}</p></div>

            </div>`;

    function openRequestModal(pharmacyId) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-prescription"></i> طلب دواء</h3>
            <div class="input-group"><i class="fas fa-capsules"></i><input type="text" id="medicineName" placeholder="اسم الدواء المطلوب"></div>
            <div class="input-group"><i class="fas fa-map-marker-alt"></i><input type="text" id="reqAddress" placeholder="العنوان بالتفصيل"></div>
            <div class="input-group"><i class="fas fa-phone"></i><input type="tel" id="reqPhone" placeholder="رقم هاتفك للتواصل"></div>
            <div class="input-group"><label class="upload-btn"><i class="fas fa-camera"></i> رفع صورة الروشتة <input type="file" id="prescriptionImage" accept="image/*" class="file-input"></label><div id="imagePreview"></div></div>
            <div class="input-group"><textarea id="prescriptionNotes" placeholder="ملاحظات إضافية (اختياري)..." rows="3"></textarea></div>
            <div class="modal-buttons"><button id="sendReqBtn" class="accept-btn"><i class="fas fa-paper-plane"></i> إرسال الطلب</button><button id="cancelReqBtn" class="reject-btn"><i class="fas fa-times"></i> إلغاء</button></div>
        </div>`;
        document.body.appendChild(modal);
        let selectedImage = null;
        document.getElementById('prescriptionImage').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) { showMessage('الصورة كبيرة جداً (حد أقصى 2MB)', true); return; }
                const reader = new FileReader();
                reader.onload = (ev) => { selectedImage = ev.target.result; document.getElementById('imagePreview').innerHTML = `<img src="${selectedImage}" style="max-width:100%;max-height:100px;margin-top:8px;border-radius:8px;">`; };
                reader.readAsDataURL(file);
            }
        };
        document.getElementById('sendReqBtn').onclick = async () => {
            const medicineName = document.getElementById('medicineName').value;
            const address = document.getElementById('reqAddress').value;
            const phone = document.getElementById('reqPhone').value;
            const notes = document.getElementById('prescriptionNotes').value;
            if (!medicineName || !address || !phone) { showMessage('يرجى إدخال اسم الدواء والعنوان ورقم الهاتف', true); return; }
            const pharmacy = await getUserData(pharmacyId);
            await db.ref('requests').push({
                clientId: currentUser.username,
                pharmacyId: pharmacyId,
                pharmacyName: pharmacy.pharmacyName || pharmacy.username,
                medicineName: medicineName,
                address: address,
                clientPhone: phone,
                prescriptionImage: selectedImage,
                prescriptionNotes: notes,
                status: 'pending',
                rated: false,
                createdAt: Date.now()
            });
            showMessage('تم إرسال الطلب بنجاح! سيتم إشعار الصيدلية');
            modal.remove();
        };
        document.getElementById('cancelReqBtn').onclick = () => modal.remove();
    }

    function openRatingModal(requestId, pharmacyId) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-star"></i> تقييم الصيدلية</h3><div class="rating-input"><label><i class="fas fa-star" style="color:#f39c12;"></i> التقييم</label><select id="rateStars"><option value="5">★★★★★ (ممتاز)</option><option value="4">★★★★☆ (جيد جداً)</option><option value="3">★★★☆☆ (جيد)</option><option value="2">★★☆☆☆ (مقبول)</option><option value="1">★☆☆☆☆ (سيئ)</option></select></div><div class="comment-input"><label><i class="fas fa-comment"></i> تعليقك</label><textarea id="rateComment" placeholder="اكتب تجربتك مع الصيدلية..." rows="3"></textarea></div><div class="modal-buttons"><button id="submitRateBtn" class="accept-btn"><i class="fas fa-paper-plane"></i> إرسال التقييم</button><button id="cancelRateBtn" class="reject-btn"><i class="fas fa-times"></i> إلغاء</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('submitRateBtn').onclick = async () => {
            const stars = parseInt(document.getElementById('rateStars').value);
            const comment = document.getElementById('rateComment').value;
            const pharmacy = await getUserData(pharmacyId);
            await db.ref('users/' + pharmacyId).update({
                ratingSum: (pharmacy.ratingSum||0) + stars,
                ratingCount: (pharmacy.ratingCount||0) + 1,
                avgRating: ((pharmacy.ratingSum||0) + stars) / ((pharmacy.ratingCount||0) + 1),
                comments: [...(pharmacy.comments||[]), { username: currentUser.username, rating: stars, comment, date: new Date().toISOString() }]
            });
            await db.ref('requests/' + requestId).update({ rated: true });
            showMessage('شكراً لتقييمك! تم إضافة تعليقك');
            modal.remove();
            renderClientRequests();
        };
        document.getElementById('cancelRateBtn').onclick = () => modal.remove();
    }

    function openRejectModal(requestId) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><h3><i class="fas fa-ban"></i> رفض الطلب</h3><textarea id="rejectReason" placeholder="سبب الرفض..." rows="4"></textarea><div class="modal-buttons"><button id="confirmRejectBtn" class="accept-btn"><i class="fas fa-check"></i> تأكيد الرفض</button><button id="cancelRejectBtn" class="reject-btn"><i class="fas fa-times"></i> إلغاء</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('confirmRejectBtn').onclick = async () => {
            const reason = document.getElementById('rejectReason').value;
            if (!reason) { showMessage('الرجاء كتابة سبب الرفض', true); return; }
            const reqSnap = await db.ref('requests/' + requestId).once('value');
            const reqData = reqSnap.val();
            const client = await getUserData(reqData.clientId);
            await db.ref('requests/' + requestId).update({ status: 'rejected', rejectReason: reason, rejectedAt: Date.now(), clientName: client?.username || reqData.clientId });
            showMessage('تم رفض الطلب وإرسال السبب للمريض');
            modal.remove();
            renderPharmacyRequests();
            updateNotificationCount();
        };
        document.getElementById('cancelRejectBtn').onclick = () => modal.remove();
    }

        document.getElementById('sidebar').classList.remove('open'); 
        document.getElementById('overlay').classList.remove('show'); 
    }

            document.getElementById('sidebar').classList.add('open'); 
            document.getElementById('overlay').classList.add('show'); 
        }

        renderPage(); 
        closeSidebar(); 
    };

    (async function() {
        await initLocationsData();
        
        document.getElementById('menuBtn').onclick = openSidebar;

            e.preventDefault(); 
            closeSidebar(); 
            renderPage(); 
        };
        document.getElementById('sideProfile').onclick = (e) => { 
            e.preventDefault(); 
            closeSidebar(); 
            renderProfile(); 
        };
        document.getElementById('sideRequests').onclick = (e) => { 
            e.preventDefault();

        };

            e.preventDefault(); 
            closeSidebar(); 
            logout(); 
        };
        
        // إخفاء زر الرجوع المحمول في البداية
        document.getElementById('mobileBackBtn').classList.add('hidden');
        
        showAuthScreen();
    })();
